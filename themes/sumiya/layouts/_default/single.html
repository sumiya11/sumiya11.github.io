<!DOCTYPE html>
<html>
  {{ partial "header.html" . }}
  <body class="home-page">
    {{ partial "topbar.html" . }}
    <div class="container wrapper">
      {{ partial "head.html" . }}
      <div class="home-content">
        <main class="home-main" aria-label="Main content">
          <section class="home-section page-section">
            <h2>{{ .Title }}</h2>
            <div class="page-copy">
              {{ .Content }}
            </div>
          </section>
        </main>
      </div>
    </div>
    {{ partial "footer.html" . }}
  </body>
</html>
